<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mumbai Indians</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#004ba0,#0a1f44);
  color:white;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.4);
}

nav h1{color:#ffd700;}

.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h2{font-size:50px;}

.btn{
  padding:10px 20px;
  background:#ffd700;
  border:none;
  cursor:pointer;
  margin-top:20px;
  border-radius:20px;
}

.section{
  padding:60px 20px;
  text-align:center;
}

.players{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card:hover{
  transform:scale(1.05);
}

footer{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<nav id="nav">
<h1>MI</h1>
<div onclick="scrollToSection('players')">Players</div>
</nav>

<section class="hero">
<div>
<h2 id="typing"></h2>
<p>5 Time IPL Champions</p>
<button class="btn" onclick="showMsg()">Explore</button>
</div>
</section>

<section class="section" id="players">
<h2>Star Players</h2>
<div class="players">

<div class="card">
<img src="https://source.unsplash.com/300x200/?cricket"/>
<h3>Rohit Sharma</h3>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?fast-bowling"/>
<h3>Jasprit Bumrah</h3>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?all-rounder"/>
<h3>Hardik Pandya</h3>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?batting"/>
<h3>Suryakumar Yadav</h3>
</div>

</div>
</section>

<footer>
<p>© Mumbai Indians Fan Page</p>
</footer>

<script>
// typing effect
const text="Mumbai Indians - Duniya Hila Denge!";
let i=0;
function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,50);
  }
}
type();

// scroll
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

// button
function showMsg(){
  alert("MI Power!");
}

// navbar effect
window.addEventListener("scroll",()=>{
  const nav=document.getElementById("nav");
  nav.style.background=window.scrollY>50?"rgba(0,0,0,0.8)":"rgba(0,0,0,0.4)";
});
</script>

</body>
</html>
